apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-ui
spec:
  selector:
    matchLabels:
      app: todo-ui
  template:
    metadata:
      labels:
        app: todo-ui
    spec:
      containers:
      - name: todo-ui
        image: acrrg3.azurecr.io/todo-ui-tasks-api:v1 
        ports:
        - containerPort: 80
